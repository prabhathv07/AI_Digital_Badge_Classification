name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install linting tools
        run: pip install ruff

      - name: Check syntax (py_compile)
        run: python -m py_compile code_samples/classification_engine_excerpt.py code_samples/nlp_pipeline_excerpt.py code_samples/regex_patterns_excerpt.py code_samples/validation_framework_excerpt.py

      - name: Lint with ruff
        run: ruff check code_samples/

  deps:
    name: Validate requirements.txt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dry-run install (resolve deps, no download)
        run: pip install --dry-run -r requirements.txt
